on:
  push:
    branches: [ main ]

jobs:
  export_game:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    name: Export Game
    steps:
    - name: checkout
      uses: actions/checkout@v5
  
    - name: export game
      id: export
      uses: firebelley/godot-export@v7.0.0
      with:
        godot_executable_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=linux.x86_64.zip&platform=linux.64
        godot_export_templates_download_url: https://downloads.godotengine.org/?version=4.6.2&flavor=stable&slug=export_templates.tpz&platform=templates
        relative_project_path: ./
        archive_output: true

    - name: create release
      uses: ncipollo/release-action@v1.21.0
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        generateReleaseNotes: true
        tag: nightly
        prerelease: true
        allowUpdates: true
        removeArtifacts: true
        artifacts: ${{ steps.export.outputs.archive_directory }}/*

    - name: Setup Pages
      uses: actions/configure-pages@v4
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '/home/runner/.local/share/godot/builds/Web/'
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
